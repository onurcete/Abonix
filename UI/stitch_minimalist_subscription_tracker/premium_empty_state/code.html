<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-dot::after {
            content: '';
            position: absolute;
            bottom: -6px;
            width: 4px;
            height: 4px;
            background-color: currentColor;
            border-radius: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 py-2 bg-stone-50/80 dark:bg-zinc-950/80 backdrop-blur-md border-b border-stone-200/50 dark:border-zinc-800/50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-primary-container">
<img alt="user profile picture" data-alt="close up professional headshot of a smiling person in a neutral setting with soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1SpfFN5UJf2wbM2zBj_-tt27jjX4ZdMn-r8LYxYvFPhQSPs5OP-Cy5EVV_bDvrQsyFNCjOUfpBhyTIuCz_OoWA1qJcs7iFjcp2iw8NcsShIAbOqczVj_DftuxlAxeZc1SoYZ_1ApilIvPEUqmHv21zEYhVMp_cVFH3WbhdVmiyDZlIGGyoU19BPDbdg2XahjOAXwfTDsUYyumTFil6iKQ2fufSmPH_NBqGQ3OhmjHgoEtHuJZ8w4PxiyuKyDmMe5SRYqleT0MHgU"/>
</div>
<h1 class="text-lg font-bold text-stone-900 dark:text-stone-50 font-headline-sm">Mindful Tracking</h1>
</div>
<button class="p-2 rounded-full hover:bg-stone-200/50 dark:hover:bg-zinc-800/50 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-stone-500 dark:text-stone-400" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-16 pb-24">
<div class="w-full max-w-md text-center flex flex-col items-center">
<!-- Soft Illustration -->
<div class="relative mb-xl">
<div class="absolute inset-0 bg-primary/5 rounded-full scale-150 blur-3xl"></div>
<div class="relative w-48 h-48 flex items-center justify-center">
<div class="w-40 h-40 bg-white dark:bg-zinc-900 rounded-[2.5rem] shadow-[0_4px_15px_rgba(0,0,0,0.04)] flex items-center justify-center border border-surface-container-highest">
<span class="material-symbols-outlined text-[80px] text-primary/40 select-none" data-icon="potted_plant">potted_plant</span>
</div>
<!-- Decorative floating elements -->
<div class="absolute -top-4 -right-4 w-12 h-12 bg-secondary-container/20 rounded-full blur-xl"></div>
<div class="absolute -bottom-2 -left-6 w-16 h-16 bg-primary-container/20 rounded-full blur-xl"></div>
</div>
</div>
<!-- Empty State Text -->
<div class="space-y-sm mb-xl max-w-xs">
<h2 class="font-headline-lg text-headline-lg text-on-surface">No subscriptions yet</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed">
                    Start tracking your monthly expenses by adding your first subscription.
                </p>
</div>
<!-- CTA Button -->
<button class="w-full py-4 px-lg rounded-xl bg-gradient-to-b from-primary to-[#3a5448] text-on-primary font-label-lg shadow-[0_4px_10px_rgba(70,101,87,0.2)] hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-xs">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
                Add your first subscription
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-lg rounded-t-3xl border-t border-stone-100 dark:border-zinc-800 shadow-[0_-4px_20px_0_rgba(0,0,0,0.04)]">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center text-emerald-600 dark:text-emerald-400 relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-emerald-600 after:rounded-full group transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-manrope text-[10px] font-semibold uppercase tracking-wider">Home</span>
</a>
<!-- Statistics -->
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 hover:text-emerald-500 transition-all active:transform active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
<span class="font-manrope text-[10px] font-semibold uppercase tracking-wider">Statistics</span>
</a>
<!-- Categories -->
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 hover:text-emerald-500 transition-all active:transform active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="grid_view">grid_view</span>
<span class="font-manrope text-[10px] font-semibold uppercase tracking-wider">Categories</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 hover:text-emerald-500 transition-all active:transform active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-manrope text-[10px] font-semibold uppercase tracking-wider">Settings</span>
</a>
</nav>
