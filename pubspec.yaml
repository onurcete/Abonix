name: abonix_tracker
description: Mindful subscription tracker app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.2.0
  go_router: ^16.2.4
  intl: ^0.20.2
  path: ^1.9.1
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: '#F7F7F5'
  adaptive_icon_foreground: assets/branding/app_icon.png

flutter_native_splash:
  color: '#F7F7F5'
  image: assets/branding/splash_logo.png
  android_12:
    color: '#F7F7F5'
    image: assets/branding/splash_logo.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/
    - assets/brands/svg/
    - assets/brands/png/
    - assets/brands/jpeg/
    - UI/stitch_minimalist_subscription_tracker/logo/logo.png
